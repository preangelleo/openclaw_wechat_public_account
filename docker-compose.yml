services:
  wechat-publisher:
    build: .
    container_name: wechat-publisher
    ports:
      - "5015:5015"
    environment:
      - REDIS_URL=redis://animagent-redis:6379
      - POSTGRES_HOST=animagent-postgres
      - POSTGRES_PORT=5432
    env_file:
      - .env
    restart: unless-stopped
    networks:
      - animagent-network
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:5015/health || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  animagent-network:
    external: true
