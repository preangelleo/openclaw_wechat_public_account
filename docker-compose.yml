services:
  openclaw-wechat:
    build: .
    container_name: openclaw-wechat
    ports:
      - "5006:5015"
    env_file:
      - .env
    restart: unless-stopped
    networks:
      - macroalpha-network
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:5015/health || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  macroalpha-network:
    external: true
