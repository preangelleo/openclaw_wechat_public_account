services:
  openclaw-wechat:
    build: .
    container_name: openclaw-wechat
    ports:
      - "5006:5015"
    environment:
      - ADMIN_API_KEY=ag_system_8a3758167e696250ebf7f3d5ae23c8c1ab8c7a5fe3571032c14d77de2b4e25b1
    restart: unless-stopped
    networks:
      - macroalpha-network
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:5015/health || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  macroalpha-network:
    external: true
